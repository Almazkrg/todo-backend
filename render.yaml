databases:
  - name: todo-db
    plan: free
    databaseName: todo
    user: todo

services:
  - type: web
    name: todo-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
